apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: ansible-builder
  namespace: ansible-ees
spec:
  params:
    - default: 'https://github.com/giulianoquites/ansible-execution-environments.git'
      description: URL of the Git repository containing the execution environment files
      name: git-url
      type: string
    - default: main
      description: 'Git branch, tag, or commit ID'
      name: git-revision
      type: string
    - default: 'registry.redhat.io/ansible-automation-platform-26/ee-minimal-rhel9:latest'
      description: The location of the ansible-builder image
      name: ANSIBLE_BUILDER_IMAGE
      type: string
    - default: quay.io/xxxxxx/ansible-ee-pipeline
      description: Full repository name of the container image to be built
      name: NAME
      type: string
    - default: latest
      description: Tag of the container image to be built
      name: TAG
      type: string
    - default: context/
      description: Path to the directory used as the Buildah build context
      name: CONTEXT
      type: string
    - default: Containerfile
      description: Path to the Containerfile relative to the build context
      name: DOCKERFILE
      type: string
    - default: '""'
      description: Additional arguments passed to the Buildah build command
      name: BUILD_ARGS
      type: string
    - default: '""'
      description: Additional arguments passed to the Buildah push command
      name: PUSH_ARGS
      type: string
    - default: 'false'
      description: Verify TLS when accessing the container registry
      name: TLSVERIFY
      type: string
  tasks:
    - name: fetch-repository
      params:
        - name: URL
          value: 'https://github.com/giulianoquites/ansible-execution-environments.git'
        - name: revision
          value: c8207ee8533f03a0edadb0a7e5c2d627928c484b
        - name: deleteExisting
          value: 'true'
      taskRef:
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone-1-23-0
          - name: namespace
            value: openshift-pipelines
        resolver: cluster
      workspaces:
        - name: output
          workspace: ee-repo
    - name: ansible-builder-create
      params:
        - name: BUILDER_IMAGE
          value: 'registry.redhat.io/ansible-automation-platform-21/ansible-builder-rhel8:1.0.1-47'
      runAfter:
        - fetch-repository
      taskRef:
        kind: Task
        name: ansible-builder
      workspaces:
        - name: source
          workspace: ee-repo
    - name: build-image-tag
      params:
        - name: IMAGE
          value: 'quay.io/xxxxxx/ansible-ee-pipeline:latest'
        - name: TLSVERIFY
          value: 'false'
        - name: CONTEXT
          value: context/
        - name: DOCKERFILE
          value: Containerfile
        - name: BUILD_EXTRA_ARGS
          value: ''
        - name: PUSH_EXTRA_ARGS
          value: ''
      runAfter:
        - ansible-builder-create
      taskRef:
        params:
          - name: kind
            value: task
          - name: name
            value: buildah-1-23-0
          - name: namespace
            value: openshift-pipelines
        resolver: cluster
      workspaces:
        - name: source
          workspace: ee-repo
    - name: build-image-latest
      params:
        - name: IMAGE
          value: 'quay.io/xxxxxx/ansible-ee-pipeline:latest'
        - name: TLSVERIFY
          value: 'false'
        - name: CONTEXT
          value: context/
        - name: DOCKERFILE
          value: Containerfile
        - name: BUILD_EXTRA_ARGS
          value: ''
        - name: PUSH_EXTRA_ARGS
          value: ''
      runAfter:
        - ansible-builder-create
      taskRef:
        params:
          - name: kind
            value: task
          - name: name
            value: buildah-1-23-0
          - name: namespace
            value: openshift-pipelines
        resolver: cluster
      workspaces:
        - name: source
          workspace: ee-repo
  workspaces:
    - name: ee-repo

