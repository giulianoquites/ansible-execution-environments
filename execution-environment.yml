---
version: 3

build_arg_defaults:
  EE_BASE_IMAGE: registry.redhat.io/ansible-automation-platform-26/ee-supported-rhel9:latest

dependencies:
  galaxy: requirements.yml
  python: requirements.txt
  system: bindep.txt

additional_build_steps:
  prepend_base:
    - RUN cat /etc/os-release
    - VOLUME ["/repository"]

  append_final:
    - RUN echo "Execution Environment build completed"
    - RUN ls -la /etc
    - RUN ls -la /
